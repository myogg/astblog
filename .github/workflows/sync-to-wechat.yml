name: Sync Issues to WeChat

on:
  # 每天 9:00 和 18:00 自动触发
  schedule:
    - cron: '0 1 * * *' # 9:00 北京时间
    - cron: '0 10 * * *' # 18:00 北京时间
  
  # 手动触发
  workflow_dispatch:
  
  # Issue 更新时触发
  issues:
    types: [opened, edited, labeled]

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install wechatpy markdown pyyaml requests cryptography
    
    - name: Sync Issues to WeChat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        SYNC_LABEL: ${{ vars.SYNC_LABEL || 'wechat-publish' }}
        WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
        WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
      run: python sync_issues_to_wechat.py
    
    - name: Commit sync state
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .sync_state.json
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: update sync state"
        git push
